version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: fitflow-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fitflow_gym
      POSTGRES_USER: fitflow_admin
      POSTGRES_PASSWORD: fitflow_secure_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fitflow-network

  # Backend Service (Laravel API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitflow-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8080:8080" # WebSockets Reverb Port
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      - db
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fitflow_gym
      DB_USERNAME: fitflow_admin
      DB_PASSWORD: fitflow_secure_password
    entrypoint:
      - sh
      - -c
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
        fi
        composer install --no-interaction --prefer-dist --optimize-autoloader
        php artisan key:generate --force
        php artisan migrate --force
        php artisan db:seed --force
        php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - fitflow-network

  # Frontend Service (React + Vite in Dev Mode)
  frontend:
    image: node:20-alpine
    container_name: fitflow-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://127.0.0.1:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend
    networks:
      - fitflow-network

  # Production Web Server (Serves React Built Files & Proxies APIs)
  webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitflow-webserver
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - db
    networks:
      - fitflow-network
    profiles:
      - prod # Only runs if explicitly started with --profile prod

volumes:
  pgdata:
    driver: local

networks:
  fitflow-network:
    driver: bridge
